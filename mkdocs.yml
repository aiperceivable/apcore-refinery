site_name: apcore-refinery
site_description: Score and refine apcore module metadata for MCP, A2A, and CLI consumption.
repo_url: https://github.com/aipartnerup/apcore-refinery
repo_name: aipartnerup/apcore-refinery

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Scope & Boundaries: scope.md
  - Changelog: changelog.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
